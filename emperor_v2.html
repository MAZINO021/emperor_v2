*{box-sizing:border-box;}

.app-shell{position:relative;min-height:100vh;overflow:hidden;}
.particles-layer{position:fixed;inset:0;pointer-events:none;z-index:0;}
.dungeon-layer{position:fixed;inset:0;pointer-events:none;z-index:0;}

.scanlines{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:0.05;background:repeating-linear-gradient(180deg,transparent 0 2px,rgba(212,175,55,0.4) 2px 3px);}

@keyframes burst{0%{opacity:1;}100%{opacity:0;}}

<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;

// ── RANKS ─────────────────────────────────────────────────────
const RANKS=[
  {id:'weakling',name:'WEAKLING',tier:'I',  threshold:0},
  {id:'fighter', name:'FIGHTER', tier:'II', threshold:400},
  {id:'warrior', name:'WARRIOR', tier:'III',threshold:1200},
  {id:'warlord', name:'WARLORD', tier:'IV', threshold:3000},
  {id:'king',    name:'KING',    tier:'V',  threshold:7000},
  {id:'emperor', name:'EMPEROR', tier:'VI', threshold:14000},
];
const RANK_ORDER=RANKS.map(r=>r.id);
function rankForPoints(p){let r=RANKS[0];for(const x of RANKS)if(p>=x.threshold)r=x;return r;}
function nextRankForPoints(p){for(const x of RANKS)if(p<x.threshold)return x;return null;}

// ── SEED RANKS ────────────────────────────────────────────────
const SEED_RANKS=[
  {rank:'F',  name:'THE DORMANT',   minLvl:1,  maxLvl:20,  bloom:0.0, color:'#4a3f2b'},
  {rank:'E',  name:'THE STIRRING',  minLvl:21, maxLvl:50,  bloom:0.1, color:'#5a4b30'},
  {rank:'D',  name:'THE AWAKENING', minLvl:51, maxLvl:80,  bloom:0.2, color:'#786849'},
  {rank:'C',  name:'THE GROWING',   minLvl:81, maxLvl:120, bloom:0.35,color:'#8b5cf6'},
  {rank:'B',  name:'THE BLOOMING',  minLvl:121,maxLvl:160, bloom:0.5, color:'#a983f5'},
  {rank:'A',  name:'THE RADIANT',   minLvl:161,maxLvl:220, bloom:0.65,color:'#b985ff'},
  {rank:'S',  name:'THE ASCENDANT', minLvl:221,maxLvl:300, bloom:0.78,color:'#d4af37'},
  {rank:'SS', name:'THE SOVEREIGN', minLvl:301,maxLvl:500, bloom:0.88,color:'#ffcf3d'},
  {rank:'SSS',name:'THE ETERNAL',   minLvl:501,maxLvl:1000,bloom:0.96,color:'#ffe9a3'},
  {rank:'GOD',name:'THE ORIGIN',    minLvl:1001,maxLvl:Infinity,bloom:1.0,color:'#fff6d6'},
];
function seedRankForLevel(lvl){
  for(let i=SEED_RANKS.length-1;i>=0;i--)if(lvl>=SEED_RANKS[i].minLvl)return SEED_RANKS[i];
  return SEED_RANKS[0];
}

// ── BOSS ──────────────────────────────────────────────────────
const BOSS_TYPES=[
  {type:'duration',name:'THE IRON WALKER',  challenge:(lvl)=>`WALK ${(1+lvl*0.5).toFixed(1)} HOURS AT 3 KM/H`,target:(lvl)=>Math.round(60+lvl*30),measure:'MIN'},
  {type:'speed',   name:'THE BLOOD STRIDER',challenge:(lvl)=>`WALK AT ${(4+lvl*0.5).toFixed(1)} KM/H FOR ${60+lvl*15} MIN`,target:(lvl)=>60+lvl*15,measure:'MIN'},
  {type:'steps',   name:'THE THOUSAND PATH',challenge:(lvl)=>`COMPLETE ${(20+lvl*5).toLocaleString()},000 STEPS`,target:(lvl)=>(20+lvl*5)*1000,measure:'STEPS'},
  {type:'duration',name:'THE STONE PILGRIM',challenge:(lvl)=>`WALK ${(2+lvl*0.25).toFixed(2)} HOURS AT 4 KM/H`,target:(lvl)=>Math.round(120+lvl*15),measure:'MIN'},
];
function bossForWeek(weekNum){
  const idx=weekNum%BOSS_TYPES.length;
  const lvl=Math.floor(weekNum/BOSS_TYPES.length);
  const b=BOSS_TYPES[idx];
  return{...b,title:b.name,challenge:b.challenge(lvl),target:b.target(lvl),points:100+lvl*50};
}

// ── WORKOUT SPLITS ────────────────────────────────────────────
const WORKOUT_SPLITS={
  1:{day:'MON',name:'CHEST · TRICEPS',     glyph:'◆'},
  2:{day:'TUE',name:'LEGS · SHOULDERS',    glyph:'◇'},
  3:{day:'WED',name:'BACK · BICEPS',       glyph:'⟁'},
  4:{day:'THU',name:'CHEST · TRICEPS',     glyph:'◆'},
  5:{day:'FRI',name:'LEGS · SHOULDERS',    glyph:'◇'},
  6:{day:'SAT',name:'BACK · BICEPS · CORE',glyph:'⟢'},
};

// ── SYSTEM MESSAGES ───────────────────────────────────────────
const SYSTEM_MESSAGES=[
  'THE SYSTEM HAS CHOSEN YOU. RISE OR PERISH.',
  'A GATE HAS OPENED. THE ASCENT BEGINS.',
  'DESTINY DOES NOT WAIT. NEITHER SHALL THE EMPEROR.',
  'BLOOD, IRON, AND HOURS. THIS IS THE PRICE.',
  'ALL WHO FEAR THE GATE REMAIN WEAKLINGS.',
  'THE THRONE IS NOT GIVEN. IT IS SEIZED.',
  'EVERY DAY UNLOGGED IS A DAY THE WORLD STEALS FROM YOU.',
];

// ── ACHIEVEMENTS ──────────────────────────────────────────────
const ACHIEVEMENTS=[
  {id:'iron-will',    title:'IRON WILL',    desc:'7-DAY STREAK',        glyph:'I'},
  {id:'unbreakable',  title:'UNBREAKABLE',  desc:'30-DAY STREAK',       glyph:'X'},
  {id:'eternal-flame',title:'ETERNAL FLAME',desc:'100-DAY STREAK',      glyph:'C'},
  {id:'slayer',       title:'SLAYER',       desc:'DEFEAT 4 BOSSES',     glyph:'⚔'},
  {id:'ascending',    title:'THE ASCENDING',desc:'REACH WARRIOR',       glyph:'▲'},
  {id:'sovereign',    title:'SOVEREIGN',    desc:'REACH KING',          glyph:'◆'},
  {id:'apex',         title:'THE APEX',     desc:'REACH EMPEROR',       glyph:'✦'},
  {id:'first-blood',  title:'FIRST BLOOD',  desc:'LOG DAY ONE',         glyph:'◇'},
  {id:'scribe',       title:'THE SCRIBE',   desc:'INSCRIBE 7 JOURNALS', glyph:'✶'},
  {id:'ten-thousand', title:'TEN THOUSAND', desc:'10,000 PTS EARNED',   glyph:'M'},
  {id:'half-king',    title:'HALF-KING',    desc:'DAY 182 REACHED',     glyph:'½'},
  {id:'boss-slayer',  title:'BOSS SLAYER',  desc:'DEFEAT FIRST BOSS',   glyph:'⚡'},
];

// ── STATE ─────────────────────────────────────────────────────
const TOTAL_DAYS=365;
function makeDefault(){
  return{
    hasRisen:false,points:0,
    remainingSec:TOTAL_DAYS*86400,
    streak:0,weekNumber:1,
    bossDefeated:false,bossProgress:0,bossesDefeated:0,
    weight:'112',
    dailyLogs:{},
    weeklyLog:{weight:'',height:'',lastSealedAt:null},
    journalCount:0,
  };
}
function loadState(){
  try{
    const raw=localStorage.getItem('emperor.v3');
    if(!raw)return makeDefault();
    return{...makeDefault(),...JSON.parse(raw),hasRisen:false};
  }catch{return makeDefault();}
}
function saveState(s){
  try{const{hasRisen,...p}=s;localStorage.setItem('emperor.v3',JSON.stringify(p));}catch{}
}

// ── BRACKET CORNERS ───────────────────────────────────────────
function BracketCorners({color='#d4af37'}){
  const size=12,thick=2;
  return(<>
    {['tl','tr','bl','br'].map(pos=>{
      const b={position:'absolute',width:size,height:size,borderColor:color,borderStyle:'solid',borderWidth:0};
      const o=-1;
      const s=pos==='tl'?{...b,top:o,left:o,borderTopWidth:thick,borderLeftWidth:thick}:
               pos==='tr'?{...b,top:o,right:o,borderTopWidth:thick,borderRightWidth:thick}:
               pos==='bl'?{...b,bottom:o,left:o,borderBottomWidth:thick,borderLeftWidth:thick}:
                           {...b,bottom:o,right:o,borderBottomWidth:thick,borderRightWidth:thick};
      return<span key={pos} style={s}/>;
    })}
  </>);
}

// ── GOLD FRAME ────────────────────────────────────────────────
function GoldFrame({label,children,danger=false,mystic=false,style,onClick}){
  const bc=danger?'rgba(255,74,61,0.4)':mystic?'rgba(139,92,246,0.4)':'rgba(212,175,55,0.28)';
  const brc=danger?'#ff4a3d':mystic?'#8b5cf6':'#d4af37';
  const ig=danger?'inset 0 0 24px rgba(255,74,61,0.12),inset 0 0 1px rgba(255,74,61,0.5)':
           mystic?'inset 0 0 24px rgba(139,92,246,0.15),inset 0 0 1px rgba(139,92,246,0.5)':
                  'inset 0 0 24px rgba(212,175,55,0.12),inset 0 0 1px rgba(255,207,61,0.4)';
  const lc=danger?'#ff4a3d':mystic?'#a983f5':'#d4af37';
  return(
    <section onClick={onClick} style={{position:'relative',background:'linear-gradient(160deg,rgba(26,15,46,0.55) 0%,rgba(7,5,13,0.92) 100%)',border:`1px solid ${bc}`,boxShadow:ig,padding:'22px 24px 20px',...style}}>
      <BracketCorners color={brc}/>
      {label&&<div style={{position:'absolute',top:-9,left:18,padding:'0 8px',background:'#000',fontFamily:'var(--font-body)',fontWeight:600,fontSize:10,letterSpacing:'0.32em',textTransform:'uppercase',color:lc,whiteSpace:'nowrap'}}>[ {label} ]</div>}
      {children}
    </section>
  );
}

// ── PARTICLES ─────────────────────────────────────────────────
function Particles({density=60}){
  const ref=useRef(null);
  useEffect(()=>{
    const canvas=ref.current;const ctx=canvas.getContext('2d');let raf;const motes=[];
    const resize=()=>{const dpr=window.devicePixelRatio||1;canvas.width=window.innerWidth*dpr;canvas.height=window.innerHeight*dpr;canvas.style.width=window.innerWidth+'px';canvas.style.height=window.innerHeight+'px';ctx.setTransform(dpr,0,0,dpr,0,0);};
    resize();window.addEventListener('resize',resize);
    for(let i=0;i<density;i++)motes.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*1.6+0.4,vy:-(Math.random()*0.25+0.05),vx:(Math.random()-0.5)*0.08,a:Math.random()*0.6+0.2,twk:Math.random()*Math.PI*2});
    const tick=()=>{
      ctx.clearRect(0,0,window.innerWidth,window.innerHeight);const t=performance.now()/1000;
      motes.forEach(m=>{m.y+=m.vy;m.x+=m.vx;if(m.y<-8){m.y=window.innerHeight+8;m.x=Math.random()*window.innerWidth;}if(m.x<-8||m.x>window.innerWidth+8)m.x=Math.random()*window.innerWidth;
        const a=m.a*(0.6+0.4*Math.sin(t*1.4+m.twk));
        ctx.beginPath();const g=ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,m.r*6);g.addColorStop(0,`rgba(255,207,61,${a})`);g.addColorStop(1,'rgba(255,207,61,0)');ctx.fillStyle=g;ctx.arc(m.x,m.y,m.r*6,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.fillStyle=`rgba(255,246,214,${a})`;ctx.arc(m.x,m.y,m.r,0,Math.PI*2);ctx.fill();});
      raf=requestAnimationFrame(tick);};
    tick();return()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);};
  },[density]);
  return<canvas ref={ref} className="particles-layer"/>;
}

// ── SEED BLOB ─────────────────────────────────────────────────
function SeedBlob({scale,t,rank,isGod}){
  const pts=14,baseR=60;
  const time=(t/1000)%1000;
  const path=useMemo(()=>{
    const p=[];
    for(let i=0;i<pts;i++){const a=(i/pts)*Math.PI*2;const w=Math.sin(time*0.6+i*1.7)*8+Math.cos(time*0.4+i*0.9)*5;p.push([100+Math.cos(a)*(baseR+w),100+Math.sin(a)*(baseR+w)]);}
    let d=`M ${p[0][0]} ${p[0][1]}`;
    for(let i=0;i<p.length;i++){const cur=p[i],next=p[(i+1)%p.length];const mx=(cur[0]+next[0])/2,my=(cur[1]+next[1])/2;d+=` Q ${cur[0]} ${cur[1]} ${mx} ${my}`;}
    return d+'Z';
  },[Math.round(time*4)]);
  return(
    <svg viewBox="0 0 200 200" width="220" height="220" style={{transform:`scale(${scale})`,transition:'transform 600ms ease-out',overflow:'visible'}}>
      <defs>
        <radialGradient id="seedFill" cx="40%" cy="35%" r="70%">
          <stop offset="0%" stopColor={isGod?'#fff6d6':'#a983f5'}/>
          <stop offset="55%" stopColor={isGod?'#ffcf3d':'#5a2fa0'}/>
          <stop offset="100%" stopColor={isGod?'#9a7515':'#1a0f2e'}/>
        </radialGradient>
      </defs>
      <path d={path} fill="url(#seedFill)" stroke={isGod?'#ffcf3d':rank.color} strokeWidth="1.5" style={{filter:isGod?'drop-shadow(0 0 22px rgba(255,207,61,0.85))':`drop-shadow(0 0 18px ${rank.color}cc)`}}/>
      <circle cx="100" cy="100" r={6+rank.bloom*4} fill={isGod?'#fff6d6':'#ffcf3d'} opacity="0.95"/>
      <ellipse cx="100" cy="100" rx="1.5" ry={4+rank.bloom*3} fill="#07050d"/>
      {rank.bloom>0.6&&Array.from({length:6},(_,i)=>{const a=(i/6)*Math.PI*2+time*0.1;const dist=90+Math.sin(time+i)*5;return(<circle key={i} cx={100+Math.cos(a)*dist} cy={100+Math.sin(a)*dist} r={2+rank.bloom*1.5} fill={isGod?'#ffe9a3':'#a983f5'} opacity="0.7"/>);})}
    </svg>
  );
}

function SeedTab({prevSeedRank,onRankUp}){
  const [startedAt,setStartedAt]=useState(()=>{const raw=localStorage.getItem('emperor.v3.seed');if(raw)return Number(raw);const n=Date.now();localStorage.setItem('emperor.v3.seed',String(n));return n;});
  const [now,setNow]=useState(Date.now());
  const [resetting,setResetting]=useState(false);
  const [showRankUp,setShowRankUp]=useState(false);
  const prevRankRef=useRef(null);
  useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),250);return()=>clearInterval(t);},[]);

  const elapsedSec=Math.max(0,Math.floor((now-startedAt)/1000));
  // 1 point every 10 mins = 1 level every 10 mins
  const level=1+Math.floor(elapsedSec/600);
  const seedRank=seedRankForLevel(level);
  const isGod=seedRank.rank==='GOD';
  const hh=String(Math.floor(elapsedSec/3600)).padStart(2,'0');
  const mm=String(Math.floor((elapsedSec%3600)/60)).padStart(2,'0');
  const ss=String(elapsedSec%60).padStart(2,'0');
  const blobScale=0.35+seedRank.bloom*1.6;
  const nextSeedRank=SEED_RANKS[Math.min(SEED_RANKS.length-1,SEED_RANKS.indexOf(seedRank)+1)];
  const secInRank=elapsedSec%(600*(nextSeedRank.minLvl-seedRank.minLvl)||600);
  const rankPct=Math.min(100,((level-seedRank.minLvl)/(nextSeedRank.minLvl-seedRank.minLvl||1))*100);

  // Detect rank up while app was closed

    if(prevRankRef.current&&prevRankRef.current!==seedRank.rank){

      setTimeout(()=>setShowRankUp(false),3500);

// ── WEEKLY REPORT ─────────────────────────────────────────────
function WeeklyReport({thisWeek,lastWeek,grade}){

  const gb=g=>({S:'BEYOND ASCENT',A:'WORTHY OF RANK',B:'STEADY HAND',C:'THE PATH HOLDS',D:'SHARPEN THY VOW',F:'PERISH AND BEGIN AGAIN'})[g]||'—';
  const Row=({label,cur,prev,unit,big,signed})=>{const delta=typeof cur==='number'&&typeof prev==='number'?cur-prev:null;const up=delta!==null&&delta>0;const dn=delta!==null&&delta<0;return(<div style={{display:'grid',gridTemplateColumns:'1fr auto auto auto',gap:10,alignItems:'baseline',padding:'7px 0',borderBottom:'1px dashed rgba(212,175,55,0.18)'}}>
    <div style={{fontFamily:'var(--font-body)',fontWeight:600,fontSize:10,letterSpacing:'0.32em',textTransform:'uppercase',color:'#d4af37'}}>{label}</div>
    <div style={{fontFamily:'var(--font-mono)',fontWeight:700,fontSize:big?20:15,color:'#ffe9a3',fontVariantNumeric:'tabular-nums'}}>{signed&&cur>0?'+':''}{typeof cur==='number'?Number.isInteger(cur)?cur:cur.toFixed(1):cur}<span style={{fontFamily:'var(--font-body)',fontSize:9,color:'#786849',letterSpacing:'0.2em',marginLeft:4}}>{unit}</span></div>
    <div style={{fontFamily:'var(--font-mono)',fontSize:11,color:'#4a3f2b',fontVariantNumeric:'tabular-nums'}}>← {typeof prev==='number'?Number.isInteger(prev)?prev:prev.toFixed(1):prev}</div>
    <div style={{minWidth:44,textAlign:'right',fontFamily:'var(--font-mono)',fontWeight:700,fontSize:11,color:up?'#5be58a':dn?'#ff8a80':'#786849'}}>{delta===null?'':(up?'▲ +':dn?'▼ ':'◆ ')+Math.abs(delta).toFixed(Number.isInteger(delta)?0:1)}</div>
  </div>);};

          <Row label="POINTS" cur={thisWeek.points} prev={lastWeek.points} unit="PTS" big/>
          <Row label="WORKOUTS" cur={thisWeek.workouts} prev={lastWeek.workouts} unit="/ 6"/>
          <Row label="BOSS SLAIN" cur={thisWeek.boss?1:0} prev={lastWeek.boss?1:0} unit={thisWeek.boss?'YEA':'NAY'}/>
          <Row label="STREAK" cur={thisWeek.streak} prev={lastWeek.streak} unit="DAYS"/>

          <div style={{fontFamily:'var(--font-body)',fontSize:10,color:'#d4af37',letterSpacing:'0.4em',textTransform:'uppercase',marginBottom:6}}>◆ GRADE</div>

      </div>
      <div style={{fontFamily:'var(--font-heading)',fontWeight:500,fontSize:'clamp(17px,2.6vw,30px)',letterSpacing:'0.18em',textTransform:'uppercase',color:'#ffe9a3',margin:'0 0 8px',textAlign:'center'}}>ARE YOU READY TO RISE?</div>
      <div style={{display:'flex',gap:16,marginTop:30,flexWrap:'wrap',justifyContent:'center'}}>
        <button onMouseEnter={()=>setHov('rise')} onMouseLeave={()=>setHov(null)} onClick={go} style={{fontFamily:'var(--font-body)',fontWeight:700,fontSize:14,letterSpacing:'0.32em',textTransform:'uppercase',padding:'16px 34px',background:'linear-gradient(180deg,#ffcf3d 0%,#d4af37 100%)',color:'#07050d',border:'1px solid #ffcf3d',cursor:'pointer',boxShadow:hov==='rise'?'0 0 32px rgba(255,207,61,0.9),0 0 72px rgba(212,175,55,0.5)':'0 0 16px rgba(255,207,61,0.5)',transform:hov==='rise'?'translateY(-1px)':'translateY(0)',transition:'all 200ms'}}>I WILL RISE</button>
        <button onMouseEnter={()=>setHov('not')} onMouseLeave={()=>setHov(null)} onClick={onLater} style={{fontFamily:'var(--font-body)',fontWeight:600,fontSize:14,letterSpacing:'0.32em',textTransform:'uppercase',padding:'16px 34px',background:hov==='not'?'rgba(212,175,55,0.14)':'rgba(212,175,55,0.04)',color:hov==='not'?'#fff6d6':'#d4af37',border:'1px solid #d4af37',cursor:'pointer',boxShadow:hov==='not'?'0 0 12px rgba(255,207,61,0.35)':'none',transition:'all 200ms'}}>NOT YET</button>
      </div>
      <div style={{position:'absolute',bottom:20,left:0,right:0,textAlign:'center',fontFamily:'var(--font-body)',fontSize:10,color:'#4a3f2b',letterSpacing:'0.4em',textTransform:'uppercase'}}>◇ THE GATE WAITS ◇</div>
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────
function Dashboard({state,setState,onSignOut}){
  const [tab,setTab]=useState('dashboard');
  const [rankUpFrom,setRankUpFrom]=useState(null);
  const prevRankRef=useRef(null);

  useEffect(()=>{const t=setInterval(()=>{setState(s=>{const ns={...s,remainingSec:Math.max(0,(s.remainingSec||TOTAL_DAYS*86400)-1)};saveState(ns);return ns;});},1000);return()=>clearInterval(t);},[]);

  const curRank=rankForPoints(state.points);
  const nextRank=nextRankForPoints(state.points);
  const curIdx=RANKS.findIndex(r=>r.id===curRank.id);
  const rankFloor=curRank.threshold;
  const rankCeil=nextRank?nextRank.threshold:curRank.threshold+1;
  const rankProgress=nextRank?((state.points-rankFloor)/(rankCeil-rankFloor))*100:100;

  useEffect(()=>{
    if(prevRankRef.current&&prevRankRef.current!==curRank.id){
      const pi=RANK_ORDER.indexOf(prevRankRef.current),ni=RANK_ORDER.indexOf(curRank.id);
      if(ni>pi)setRankUpFrom(prevRankRef.current);
    }
    prevRankRef.current=curRank.id;
  },[curRank.id]);

  const rem=state.remainingSec||TOTAL_DAYS*86400;
  const daysRem=Math.ceil(rem/86400);
  const dayNum=TOTAL_DAYS-daysRem+1;
  const dow=new Date().getDay();
  const isSun=dow===0;
  const todayKey=new Date().toISOString().slice(0,10)+'-w'+dow;
  const todayLog=state.dailyLogs[todayKey]||{workout:false,calories:'',journal:''};

  const updateLog=(nl)=>{
    const pp=(todayLog.workout?8:0)+(Number(todayLog.calories)>0?4:0)+(todayLog.journal&&todayLog.journal.trim().length>20?2:0);
    const np=(nl.workout?8:0)+(Number(nl.calories)>0?4:0)+(nl.journal&&nl.journal.trim().length>20?2:0);
    const journalBonus=nl.journal&&nl.journal.trim().length>20&&!(todayLog.journal&&todayLog.journal.trim().length>20)?1:0;
    setState(s=>{const ns={...s,dailyLogs:{...s.dailyLogs,[todayKey]:nl},points:s.points+(np-pp),journalCount:s.journalCount+(journalBonus)};saveState(ns);return ns;});
  };
  const attackBoss=()=>setState(s=>{const ns={...s,bossProgress:Math.min(100,(s.bossProgress||0)+12)};saveState(ns);return ns;});
  const defeatBoss=()=>setState(s=>{if(s.bossDefeated)return s;const boss=bossForWeek(s.weekNumber);const ns={...s,bossDefeated:true,points:s.points+boss.points,bossesDefeated:(s.bossesDefeated||0)+1};saveState(ns);return ns;});

  const ptsToday=(todayLog.workout?8:0)+(Number(todayLog.calories)>0?4:0)+(todayLog.journal&&todayLog.journal.trim().length>20?2:0);
  const unlocked=useMemo(()=>{const o=[];if(state.streak>=7)o.push('iron-will');if(state.streak>=30)o.push('unbreakable');if(state.streak>=100)o.push('eternal-flame');if(curIdx>=2)o.push('ascending');if(curIdx>=4)o.push('sovereign');if(curIdx>=5)o.push('apex');if(dayNum>=1)o.push('first-blood');if(dayNum>=182)o.push('half-king');if(state.points>=10000)o.push('ten-thousand');if((state.bossesDefeated||0)>=1)o.push('boss-slayer');if((state.bossesDefeated||0)>=4)o.push('slayer');if((state.journalCount||0)>=7)o.push('scribe');return o;},[state.streak,curIdx,dayNum,state.points,state.bossesDefeated,state.journalCount]);

  const grade=useMemo(()=>{if(ptsToday>=14)return'S';if(ptsToday>=10)return'A';if(ptsToday>=7)return'B';if(ptsToday>=4)return'C';if(ptsToday>=1)return'D';return'F';},[ptsToday]);
  const sigilKey='rank'+curRank.id[0].toUpperCase()+curRank.id.slice(1);

  const Pill=({label,value,unit,accent})=>(<div style={{display:'flex',flexDirection:'column'}}><span style={{fontFamily:'var(--font-body)',fontSize:9,color:'#786849',letterSpacing:'0.32em',textTransform:'uppercase'}}>{label}</span><div style={{display:'flex',alignItems:'baseline',gap:5}}><span style={{fontFamily:'var(--font-mono)',fontWeight:700,fontSize:16,color:accent?'#ffe9a3':'#f5d76e',textShadow:accent?'0 0 6px rgba(255,207,61,0.45)':'none',fontVariantNumeric:'tabular-nums'}}>{value}</span>{unit&&<span style={{fontFamily:'var(--font-body)',fontSize:9,color:'#786849',letterSpacing:'0.24em'}}>{unit}</span>}</div></div>);

  return(
    <div style={{minHeight:'100vh'}}>
      {rankUpFrom&&<RankUpCinematic fromRankId={rankUpFrom} toRankId={curRank.id} onDone={()=>setRankUpFrom(null)}/>}
      <header style={{position:'sticky',top:0,zIndex:10,borderBottom:'1px solid rgba(212,175,55,0.22)',background:'linear-gradient(180deg,rgba(7,5,13,0.96),rgba(7,5,13,0.88))',backdropFilter:'blur(14px) saturate(120%)'}}>
        <div style={{maxWidth:1200,margin:'0 auto',padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:16,flexWrap:'wrap'}}>
          <button onClick={onSignOut} style={{display:'flex',alignItems:'center',gap:10,background:'transparent',border:0,padding:0,cursor:'pointer'}}>
            <img src={window.__resources.eyeSigil} alt="" style={{width:28,height:28,filter:'drop-shadow(0 0 8px rgba(255,207,61,0.55))'}}/>
            <span style={{fontFamily:'var(--font-display)',fontWeight:900,fontSize:18,letterSpacing:'0.32em',color:'#ffe9a3',textShadow:'0 0 6px rgba(255,207,61,0.45)',paddingLeft:'0.32em'}}>EMPEROR</span>
          </button>
          <div style={{display:'flex',gap:18,alignItems:'center',flexWrap:'wrap'}}>
            <Pill label="DAY" value={dayNum} unit="/ 365"/>
            <Pill label="REMAINS" value={daysRem} unit="DAYS"/>
            <Pill label="POINTS" value={state.points.toLocaleString()} accent/>
            <div style={{display:'flex',alignItems:'center',gap:6}}><FireGlyph/><Pill label="STREAK" value={state.streak} unit="DAYS"/></div>
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'4px 12px 4px 4px',border:'1px solid rgba(212,175,55,0.4)',background:'linear-gradient(180deg,rgba(212,175,55,0.08),rgba(7,5,13,0.4))'}}>
              <img src={window.__resources[sigilKey]} alt="" style={{width:26,height:26,filter:'drop-shadow(0 0 6px rgba(255,207,61,0.65))'}}/>
              <div style={{display:'flex',flexDirection:'column'}}><span style={{fontFamily:'var(--font-body)',fontSize:9,color:'#786849',letterSpacing:'0.32em',textTransform:'uppercase'}}>RANK</span><span style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:11,letterSpacing:'0.18em',color:'#ffe9a3'}}>{curRank.name}</span></div>
            </div>
          </div>
        </div>
      </header>

      <div style={{maxWidth:1200,margin:'0 auto',padding:'28px 20px 80px'}}>
        <div style={{display:'inline-flex',gap:0,border:'1px solid rgba(212,175,55,0.28)',padding:3,background:'rgba(7,5,13,0.85)',marginBottom:22,flexWrap:'wrap'}}>
          {[{id:'dashboard',label:'DASHBOARD'},{id:'seed',label:'THE SEED'},{id:'achievements',label:'VAULT OF DEEDS'}].map(o=>{
            const active=tab===o.id;
            return<button key={o.id} onClick={()=>setTab(o.id)} style={{fontFamily:'var(--font-body)',fontWeight:600,fontSize:10,letterSpacing:'0.28em',textTransform:'uppercase',padding:'9px 18px',cursor:'pointer',whiteSpace:'nowrap',background:active?'linear-gradient(180deg,#ffcf3d,#d4af37)':'transparent',color:active?'#07050d':'#d4af37',border:0,boxShadow:active?'0 0 12px rgba(255,207,61,0.45)':'none',transition:'all 160ms'}}>{o.label}</button>;
          })}
        </div>

        {tab==='dashboard'&&(
          <div style={{display:'flex',flexDirection:'column',gap:22}}>
            {/* RANK HERO */}
            <GoldFrame label="THE ASCENT">
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:20,alignItems:'center'}}>
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
                  <div style={{position:'relative',width:100,height:100}}>
                    <div style={{position:'absolute',inset:-20,background:'radial-gradient(circle,rgba(255,207,61,0.35),transparent 65%)',filter:'blur(10px)'}}/>
                    <img src={window.__resources[sigilKey]} alt="" style={{width:'100%',height:'100%',position:'relative',filter:'drop-shadow(0 0 18px rgba(255,207,61,0.7))',animation:'breathe 4s ease-in-out infinite'}}/>
                  </div>
                  <span style={{fontFamily:'var(--font-display)',fontWeight:900,fontSize:16,letterSpacing:'0.24em',color:'#ffe9a3',textShadow:'0 0 12px rgba(255,207,61,0.55)'}}>{curRank.name}</span>
                  <span style={{fontFamily:'var(--font-mono)',fontSize:9,color:'#786849',letterSpacing:'0.32em'}}>RANK {curRank.tier}</span>
                  {nextRank&&<span style={{fontFamily:'var(--font-mono)',fontSize:8,color:'#786849',letterSpacing:'0.14em',textAlign:'center'}}>NEXT: {nextRank.name}<br/>{nextRank.threshold.toLocaleString()} PTS</span>}
                </div>
                <div style={{textAlign:'center'}}>
                  <div style={{fontFamily:'var(--font-body)',fontSize:9,color:'#786849',letterSpacing:'0.4em',textTransform:'uppercase',marginBottom:6}}>◆ TOTAL POINTS ◆</div>
                  <div style={{fontFamily:'var(--font-mono)',fontWeight:700,fontSize:'clamp(42px,7vw,80px)',color:'#ffe9a3',lineHeight:1,textShadow:'0 0 16px rgba(255,207,61,0.6),0 0 48px rgba(212,175,55,0.35)',fontVariantNumeric:'tabular-nums'}}>{state.points.toLocaleString()}</div>
                  <div style={{fontFamily:'var(--font-body)',fontSize:10,color:'#d4af37',letterSpacing:'0.24em',textTransform:'uppercase',marginTop:6}}>+{ptsToday} TODAY</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontFamily:'var(--font-body)',fontSize:9,color:'#786849',letterSpacing:'0.4em',textTransform:'uppercase',marginBottom:6}}>UNTIL DESTINY</div>
                  <div style={{lineHeight:1,whiteSpace:'nowrap'}}>
                    <span style={{fontFamily:'var(--font-mono)',fontWeight:700,fontSize:'clamp(32px,5vw,52px)',color:'#ffe9a3',textShadow:'0 0 8px rgba(255,207,61,0.45)',fontVariantNumeric:'tabular-nums'}}>{daysRem}</span>
                    <span style={{fontFamily:'var(--font-display)',fontSize:13,color:'#786849',letterSpacing:'0.18em',marginLeft:6}}>/ 365</span>
                  </div>
                  <div style={{fontFamily:'var(--font-body)',fontSize:10,color:'#d4af37',letterSpacing:'0.24em',textTransform:'uppercase',marginTop:8}}>DAYS · DAY {dayNum}</div>
                </div>
              </div>
              <div style={{marginTop:24}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6,flexWrap:'wrap',gap:4}}>
                  <span style={{fontFamily:'var(--font-body)',fontWeight:600,fontSize:9,letterSpacing:'0.32em',textTransform:'uppercase',color:'#d4af37'}}>{nextRank?`${curRank.name} → ${nextRank.name}`:'EMPEROR · CROWNED'}</span>
                  <span style={{fontFamily:'var(--font-mono)',fontWeight:700,fontSize:11,color:'#ffe9a3',fontVariantNumeric:'tabular-nums'}}>{state.points.toLocaleString()} / {nextRank?nextRank.threshold.toLocaleString():'∞'}</span>
                </div>
                <div style={{position:'relative',height:12,background:'rgba(7,5,13,0.9)',border:'1px solid rgba(212,175,55,0.4)',boxShadow:'inset 0 0 8px rgba(212,175,55,0.18)'}}>
                  <div style={{position:'absolute',inset:1,width:`calc(${Math.min(100,rankProgress)}% - 2px)`,background:'linear-gradient(90deg,#9a7515,#ffcf3d 60%,#fff6d6)',boxShadow:'0 0 14px rgba(255,207,61,0.7)',transition:'width 600ms cubic-bezier(0.16,1,0.3,1)'}}/>
                </div>
                <div style={{marginTop:14}}><RankLadder points={state.points}/></div>
              </div>
            </GoldFrame>

            {/* DAILY or BOSS */}
            {isSun?<BossBattle weekNumber={state.weekNumber} defeated={state.bossDefeated} progress={state.bossProgress||0} onAttack={attackBoss} onDefeat={defeatBoss}/>:<DailyDecree dayOfWeek={dow} log={todayLog} onChange={updateLog}/>}

            {/* WEEKLY REPORT */}
            <WeeklyReport thisWeek={{points:ptsToday*7,workouts:state.streak%7,boss:state.bossDefeated,streak:state.streak,weightDelta:-0.5}} lastWeek={{points:Math.max(0,ptsToday*6),workouts:Math.max(0,(state.streak%7)-1),boss:false,streak:Math.max(0,state.streak-7),weightDelta:-0.3}} grade={grade}/>

            {/* ACHIEVEMENTS */}
            <Achievements unlocked={unlocked}/>
          </div>
        )}

        {tab==='seed'&&(<div style={{display:'flex',flexDirection:'column',gap:16,marginTop:4}}><SeedTab/><div style={{padding:'12px 16px',border:'1px solid rgba(139,92,246,0.18)',fontFamily:'var(--font-body)',fontSize:12,color:'#a983f5',letterSpacing:'0.08em',lineHeight:1.7}}>◇ <strong style={{letterSpacing:'0.18em',textTransform:'uppercase'}}>The Seed grows in silence.</strong> Every 10 minutes you earn a level. Rank up from F through GOD. Shatter only when you are ready to begin again.</div></div>)}
        {tab==='achievements'&&<div style={{marginTop:4}}><Achievements unlocked={unlocked}/></div>}
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────
function App(){
  const [state,setStateRaw]=useState(loadState);
  const setState=(upd)=>{setStateRaw(prev=>{const next=typeof upd==='function'?upd(prev):upd;saveState(next);return next;});};
  const curRank=rankForPoints(state.points);
  const runeCount=Math.min(8,RANK_ORDER.indexOf(curRank.id)+1);
  const onRise=()=>setState(s=>({...s,hasRisen:true}));
  const onLater=()=>{};
  const onSignOut=()=>setState(s=>({...s,hasRisen:false}));
  return(
    <div className="app-shell">
      <DungeonBackground rankId={curRank.id}/>
      <Particles density={55}/>
      <FloatingRunes count={runeCount}/>
      <div className="scanlines"/>
      <div className="content-layer">
        {state.hasRisen?<Dashboard state={state} setState={setState} onSignOut={onSignOut}/>:<Gate onRise={onRise} onLater={onLater}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
